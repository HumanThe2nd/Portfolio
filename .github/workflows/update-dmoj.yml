name: Update DMOJ cache

on:
  schedule:
    - cron: '0 6 * * *' # every day at 06:00 UTC
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch DMOJ user data
        id: fetch
        run: |
          curl -fS -o dmoj.json "https://dmoj.ca/api/v2/user/HumanThe2nd"
          echo "fetched=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Move cache into public folder
        run: |
          mkdir -p public
          mv dmoj.json public/dmoj.json

      - name: Commit cache
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: update DMOJ cache"
          file_pattern: public/dmoj.json
          branch: ${{ github.ref_name }}
          commit_user_name: 'github-actions'
          commit_user_email: 'actions@github.com'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
